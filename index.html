<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoAvailability — чекер блокировок</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>GeoAvailability</h1>
      <p class="subtitle">Проверка доступности серверов из разных стран</p>
    </header>

    <div id="app">
      <div class="cards" id="server-cards"></div>

      <section class="topology-section">
        <h2 class="topology-title">Схема каскада</h2>
        <div class="topology" id="topology"></div>
        <div id="topology-verdict" class="topology-verdict"></div>
      </section>

      <div id="verdict" class="verdict"></div>

      <footer>
        <small>Автопроверка каждые 5 мин через <a href="https://check-host.net" target="_blank">check-host.net</a>
        + <a href="https://github.com/features/actions" target="_blank">GitHub Actions</a>.
        Ручной запуск — <a href="https://github.com/lesom-check/cheker/actions/workflows/check.yml" target="_blank">Actions</a>.</small>
      </footer>
    </div>

    <div id="error-banner" class="error-banner hidden"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
