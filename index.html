<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoAvailability — чекер блокировок</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>GeoAvailability</h1>
      <p class="subtitle">Проверка доступности серверов из разных стран</p>
    </header>

    <div id="token-section" class="token-section"></div>

    <div id="app">
      <div class="cards" id="server-cards"></div>

      <div class="controls">
        <button id="check-all-btn" class="btn-check">
          Проверить оба сервера
        </button>
        <span id="global-status" class="global-status"></span>
      </div>

      <div id="verdict" class="verdict"></div>

      <footer>
        <small>Проверки выполняются через <a href="https://check-host.net" target="_blank">check-host.net</a>
        и <a href="https://github.com/features/actions" target="_blank">GitHub Actions</a>.
        Результаты кешируются в репозитории.</small>
      </footer>
    </div>

    <div id="error-banner" class="error-banner hidden"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
